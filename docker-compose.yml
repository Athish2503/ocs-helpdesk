services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ocs-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ocs_helpdesk
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
